# ========================================================================
# gRNA微调实验配置 - IscB.m16 Active序列 (单卡修正版)
# ========================================================================
# 修正内容:
#   1. train_file: 修正为实际数据路径
#   2. resume_from_pretrain: 修正为实际checkpoint路径
#   3. distributed: 单卡模式 (data_parallel_size=1, expert_parallel_size=1, moe_world_size=1)
#   4. output_dir: 指向宿主机映射路径 /eva/temp/test_result/fintune_grna_m16
#   5. enable_wandb: false (单卡测试模式)
#   6. max_epochs: 20 (完整训练)
# ========================================================================

data_config:
  dataset: gRNA_iscb_m16_active

  max_seq_length: 8192
  max_samples: null

  # 修正: 实际数据路径
  train_file: ./finetune/data/gRNA/iscb_m16_active.fasta

  lineage_file: null

  use_direction_tokens: true

  # 不使用物种前缀
  use_lineage_prefix: false

  # 使用RNA类型前缀
  use_rna_type_prefix: true
  rna_type_token: Y_RNA

  pretrain_ratio: 0

  enable_reverse_augmentation: true

  use_chunked: true
  cache_size: 10000
  force_rebuild_index: false

  mode: "mixed"
  glm_probability: 0

  span_config:
    max_coverage_ratios: [0.15, 0.35, 0.55, 0.75]
    coverage_probs: [0.2, 0.3, 0.3, 0.2]
    span_distributions:
      - [6, 3]
      - [40, 15]
      - [60, 15]
      - [150, 50]
      - [400, 100]
      - [800, 200]
    max_num_spans: 30
    allow_overlap: false

model_config:
  vocab_size: 114

  hidden_size: 1024
  num_hidden_layers: 26
  num_attention_heads: 16
  num_key_value_heads: 16
  intermediate_size: 3072
  max_position_embeddings: 8192
  rms_norm_eps: 1e-6
  initializer_range: 0.02
  use_cache: true
  num_experts: 8
  num_experts_per_tok: 2
  expert_capacity_factor: 1.5
  router_aux_loss_coef: 0.01
  moe_implementation: megablocks

  # 修正: 单卡 MoE world size
  moe_world_size: 1

  resid_dropout: 0
  hidden_dropout: 0
  dropout_warmup_steps: 0
  dropout_ramp_steps: 0
  dropout_schedule: "linear"

  attention_dropout: 0.0
  gradient_clip_norm: 1.0
  label_smoothing: 0.0

  eos_loss_weight: 1.0

training_config:
  run_name: gRNA_m16_active_finetuning_YRNA

  # 修正: 输出目录（容器内路径）
  output_dir: /eva/temp/test_result/fintune_grna_m16

  # 修正: 实际checkpoint路径
  resume_from_pretrain: ./checkpoint/clm/

  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1

  learning_rate: 5.0e-5

  weight_decay: 1.0e-5
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_epsilon: 1e-8

  max_epochs: 20

  min_lr_ratio: 0.1
  bf16: true
  fp16: false
  gradient_checkpointing: false
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  dataloader_drop_last: true

  # 每10步打印loss和ppl
  logging_steps: 10
  # 每800步保存一次checkpoint
  save_steps: 800

  seed: 42

  warmup_steps: 100

  max_wall_time_hours: 48

distributed_config:
  backend: nccl
  # 修正: 单卡
  data_parallel_size: 1
  expert_parallel_size: 1
  weight_parallel_size: 1

memory_config:
  cleanup_frequency: 100
  gc_frequency: 50
  enable_monitoring: true

logging_config:
  # 修正: 关闭wandb（单卡测试模式）
  enable_wandb: false
  wandb_project: eva-gRNA-finetuning
  wandb_run_name: gRNA_m16_active_finetuning
  # 修正: 输出到同一目录
  log_dir: /eva/temp/test_result/fintune_grna_m16/logs
